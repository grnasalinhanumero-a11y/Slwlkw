<!DOCTYPE html>
<html lang="pt-br" class="dark h-full antialiased scroll-smooth">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Iracemaflix - Assistir TV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { lead: '#348cfe', 'dark-bg': 'rgb(5,5,5)' }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Montserrat',sans-serif; }
        body { background:#050505; color:#fff; overflow:hidden; }
        iframe { background: #000; border: none; width: 100%; height: 100%; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

<header class="bg-[rgb(5,5,5)] border-b border-white/5 shrink-0">
    <div class="container xl:max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <a href="v6.html" class="bg-white/5 w-10 h-10 rounded-full flex items-center justify-center hover:bg-lead transition-all">
                <i class="fas fa-arrow-left"></i>
            </a>
            <h1 id="tvTitle" class="font-black text-sm uppercase tracking-widest truncate max-w-[200px] md:max-w-md">Carregando...</h1>
        </div>
        <a href="v6.html" class="block font-black text-xl tracking-tighter uppercase text-white">Iracema<span class="text-lead">flix</span></a>
    </div>
</header>

<main class="flex-1 bg-black relative">
    <div id="playerContainer" class="absolute inset-0">
        <div id="loading" class="absolute inset-0 flex flex-col items-center justify-center gap-4 z-10 bg-black text-center px-4">
            <div class="w-12 h-12 border-4 border-lead border-t-transparent rounded-full animate-spin"></div>
            <p class="text-[10px] font-black uppercase tracking-[0.3em] text-white/40">Iniciando Transmissão Segura</p>
        </div>
        <div id="iframeWrapper" class="w-full h-full hidden">
        </div>
    </div>
</main>

<script>
    const REI_API_CHANNELS = 'https://reidosembeds.com/api/channels';
    const REI_API_EVENTS = 'https://reidosembeds.com/api/eventos';

    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get('id');
    const type = urlParams.get('type');

    if (!id || !type) {
        window.location.href = 'v6.html';
    }

    async function loadContent() {
        try {
            const apiUrl = type === 'channel' ? REI_API_CHANNELS : REI_API_EVENTS;
            const response = await fetch(apiUrl);
            const data = await response.json();

            if (data.success) {
                const item = data.data.find(i => String(i.id) === String(id));
                if (item) {
                    const title = item.title || item.name || 'Canais Ao Vivo';
                    const embedUrl = type === 'channel' ? item.embed_url : item.embeds[0]?.embed_url;

                    document.getElementById('tvTitle').textContent = title;
                    
                    if (embedUrl) {
                        const wrapper = document.getElementById('iframeWrapper');
                        const loading = document.getElementById('loading');
                        
                        wrapper.innerHTML = `<iframe src="${embedUrl}" allowfullscreen scrolling="no" allow="autoplay; encrypted-media"></iframe>`;
                        
                        setTimeout(() => {
                            wrapper.classList.remove('hidden');
                            loading.classList.add('hidden');
                        }, 1000);
                    } else {
                        showError('Link de transmissão não encontrado.');
                    }
                } else {
                    showError('Conteúdo não encontrado.');
                }
            } else {
                showError('Erro ao carregar dados da API.');
            }
        } catch (error) {
            console.error(error);
            showError('Erro de conexão com o servidor.');
        }
    }

    function showError(msg) {
        document.getElementById('loading').innerHTML = `
            <i class="fas fa-exclamation-triangle text-red-500 text-3xl mb-4"></i>
            <p class="text-xs font-bold uppercase text-white/60">${msg}</p>
            <a href="v6.html" class="mt-6 px-6 py-2 bg-white/10 rounded-full text-[10px] font-black uppercase tracking-widest hover:bg-lead transition-all">Voltar</a>
        `;
    }

    loadContent();
</script>

</body>
</html>
