*{

    box-sizing:border-box;

html{

body{

}

header{

.desktop-nav{

    gap:6px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
    padding:6px;

}

.desktop-nav a{

    font-size:.75rem;
    font-weight:700;

}

.desktop-nav a:hover{
    background:rgba(255,255,255,.08);
}

.mobile-nav{
    position:fixed;
    left:50%;
    bottom:12px;
    transform:translateX(-50%);
    width:calc(100% - 20px);
    max-width:600px;
    height:64px;
    background:rgba(10,10,10,.92);

    overflow-x:auto;
}

.mobile-nav::-webkit-scrollbar{
    display:none;
}

.mobile-nav-item{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:2px;
    color:rgba(255,255,255,.5);
    text-decoration:none;
    font-size:.6rem;
    font-weight:700;

    height:100%;

}

.mobile-nav-item i{
    font-size:1rem;
}

.mobile-nav-item.active,
.mobile-nav-item:hover{

}

.calendar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
    gap: 20px;
}

.calendar-nav-btn {
    background: rgba(52,140,254,0.2);
    border: 1px solid #348cfe;
    color: #348cfe;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 700;
    font-size: 12px;
    text-transform: uppercase;
    transition: 0.3s;
}

.calendar-nav-btn:hover {
    background: #348cfe;
    color: white;
}

.calendar-month-year {
    font-size: 24px;
    font-weight: 900;
    text-transform: uppercase;
    text-align: center;
    flex: 1;
}

.filter-tabs {
    display: flex;
    gap: 12px;
    margin-bottom: 30px;
    flex-wrap: wrap;
}

.filter-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.6);
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 700;
    font-size: 12px;
    text-transform: uppercase;
    transition: 0.3s;
}

.filter-btn:hover,
.filter-btn.active {
    background: #348cfe;
    border-color: #348cfe;
    color: white;
}

.calendar-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 20px;
    padding: 20px 0;
}

.calendar-day-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 15px;
    transition: 0.3s;
    min-height: 200px;
}

.calendar-day-card:hover {
    background: rgba(255,255,255,0.08);
    border-color: #348cfe;
}

.calendar-day-header {
    font-size: 14px;
    font-weight: 900;
    color: #348cfe;
    margin-bottom: 15px;
    text-transform: uppercase;
}

.calendar-releases {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.release-item {
    background: rgba(0,0,0,0.3);
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.3s;
    border: 1px solid rgba(255,255,255,0.05);
}

.release-item:hover {
    border-color: #348cfe;
    transform: translateY(-2px);
}

.release-poster-wrapper {
    position: relative;
    width: 100%;
    aspect-ratio: 2/3;
    overflow: hidden;
}

.release-poster {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    background: #111;
}

.status-badge {
    position: absolute;
    top: 8px;
    left: 8px;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 8px;
    font-weight: 900;
    text-transform: uppercase;
    z-index: 10;
}

.status-available {
    background: #22c55e;
    color: white;
}

.status-upcoming {
    background: #ef4444;
    color: white;
}

.release-info {
    padding: 10px;
}

.release-type {
    display: inline-block;
    background: #ef4444;
    color: white;
    font-size: 8px;
    font-weight: 900;
    padding: 3px 6px;
    border-radius: 3px;
    text-transform: uppercase;
    margin-bottom: 5px;
}

.release-type.anime {
    background: #8b5cf6;
}

.release-type.dorama {
    background: #ec4899;
}

.release-type.serie {
    background: #06b6d4;
}

.release-title {
    font-size: 11px;
    font-weight: 900;
    text-transform: uppercase;
    line-clamp: 2;
    display: -webkit-box;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.release-episode {
    font-size: 9px;
    color: rgba(255,255,255,0.6);
    margin-top: 4px;
}

.empty-day {
    text-align: center;
    color: rgba(255,255,255,0.3);
    padding: 20px;
    font-size: 12px;
}

.loading {
    text-align: center;
    padding: 40px;
    color: rgba(255,255,255,0.5);
}

@media(max-width:768px){

        gap:12px;
    }

        display:flex;
    }
    header nav{
        display:none !important;
    }
}

<main class="flex-1 pt-24 lg:pt-32">
    <div class="container xl:max-w-[1400px] mx-auto px-4 py-8">

<script>
const TMDB_API_KEY = '8265bd1679663a7ea12ac168da84d2e8';
const TMDB_BASE_URL = 'https://api.themoviedb.org/3';
const TMDB_IMAGE_BASE = 'https://image.tmdb.org/t/p/w500';

let currentDate = new Date();
let currentFilter = 'todos';
let allReleases = {};

document.addEventListener('DOMContentLoaded', () => {
    loadCalendarData();
});

// Função de filtro removida

async function loadCalendarData() {
    try {
        const container = document.getElementById('calendarGrid');
        container.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Carregando calendário...</div>';
        
        const response = await fetch('https://warezcdn.lat/calendario.php');
        const data = await response.json();
        
        if (data && Array.isArray(data)) {
            data.forEach(item => {
                let date = item.data_lancamento || item.air_date || item.data || '';
                if (date) {
                    date = date.split('T')[0];
                    if (!allReleases[date]) {
                        allReleases[date] = [];
                    }
                    allReleases[date].push(item);
                }
            });
        } else if (data && data.data && Array.isArray(data.data)) {
            data.data.forEach(item => {
                let date = item.data_lancamento || item.air_date || item.data || '';
                if (date) {
                    date = date.split('T')[0];
                    if (!allReleases[date]) {
                        allReleases[date] = [];
                    }
                    allReleases[date].push(item);
                }
            });
        }
        renderCalendar();
    } catch (error) {
        console.error('Erro ao carregar calendário:', error);
        document.getElementById('calendarGrid').innerHTML = '<div class="loading">Erro ao carregar calendário. Tente novamente.</div>';
    }
}

function renderCalendar() {
    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();
    
    const monthNames = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
    document.getElementById('monthYear').textContent = `${monthNames[month]} ${year}`;
    
    const firstDay = new Date(year, month, 1);
    const lastDay = new Date(year, month + 1, 0);
    const daysInMonth = lastDay.getDate();
    
    let html = '';
    
    for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const releases = allReleases[dateStr] || [];
        
        let filtered = releases;
        
        html += `<div class="calendar-day-card">
            <div class="calendar-day-header">${day} de ${monthNames[month]}</div>
            ${filtered.length > 0 ? `
                <div class="calendar-releases">
                    ${filtered.slice(0, 3).map(item => {
                        let type = 'serie';
                        const genreStr = (item.genero || '').toLowerCase();
                        const origin = (item.pais || item.origem || '').toUpperCase();
                        
                        if (genreStr.includes('anime')) {
                            type = 'anime';
                        } else if (origin === 'KR' || genreStr.includes('dorama') || genreStr.includes('coreano')) {
                            type = 'dorama';
                        } else if (item.tipo === 'filme' || item.type === 'movie') {
                            type = 'filme';
                        }
                        
                        let poster = item.poster || item.imagem || item.poster_path || '';
                        if (poster && !poster.startsWith('http')) {
                            poster = TMDB_IMAGE_BASE + poster;
                        }
                        if (!poster) {
                            poster = 'https://via.placeholder.com/300x450?text=Sem+Poster';
                        }
                        const genre = item.genero || item.genre || type.toUpperCase();
                        const title = item.titulo || item.name || item.title || 'Sem título';
                        const season = item.temporada || item.season || '';
                        const episode = item.episodio || item.episode || '';
                        const epInfo = (season && episode) ? `T${season}E${episode}` : (episode ? `Episódio ${episode}` : 'Lançamento');
                        
                        const releaseDate = new Date(dateStr + 'T00:00:00');
                        const today = new Date();
                        today.setHours(0, 0, 0, 0);
                        
                        const isAvailable = releaseDate <= today;
                        const statusLabel = isAvailable ? 'Disponível' : dateStr.split('-').reverse().slice(0,2).join('/');
                        const statusClass = isAvailable ? 'status-available' : 'status-upcoming';

                        return `
                            <div class="release-item" onclick="window.location.href='assistir?id=${item.id || ''}&type=tv'">
                                <div class="release-poster-wrapper">
                                    <div class="status-badge ${statusClass}">${statusLabel}</div>
                                    <img src="${poster}" class="release-poster" alt="${title}" onerror="this.src='https://via.placeholder.com/300x450?text=Sem+Poster'">
                                </div>
                                <div class="release-info">
                                    <span class="release-type ${type}">${type}</span>
                                    <div class="release-title">${title}</div>
                                    <div class="release-episode">${epInfo} • ${genre}</div>
                                </div>
                            </div>
                        `;
                    }).join('')}
                    ${filtered.length > 3 ? `<div style="text-align: center; color: rgba(255,255,255,0.5); font-size: 11px; margin-top: 10px;">+${filtered.length - 3} mais</div>` : ''}
                </div>
            ` : `<div class="empty-day">Sem lançamentos</div>`}
        </div>`;
    }
    
    document.getElementById('calendarGrid').innerHTML = html;
}

function nextMonth() {
    currentDate.setMonth(currentDate.getMonth() + 1);
    renderCalendar();
}

function previousMonth() {
    currentDate.setMonth(currentDate.getMonth() - 1);
    renderCalendar();
}
</script>
