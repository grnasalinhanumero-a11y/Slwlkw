*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Montserrat',sans-serif;
    -webkit-tap-highlight-color:transparent;
}

.rating-badge{
    position:absolute;
    top:10px;
    right:10px;
    width:38px;
    height:38px;
    background:rgba(5,5,5,0.85);
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:25;
    border: 2px solid rgba(255,255,255,0.1);
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
}

.rating-circle svg{
    width:100%;
    height:100%;
    transform:rotate(-90deg);
}

.rating-circle-text{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:9px;
    font-weight:900;
    color: #fff;
}

.card-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 5px;
}

.badge {
    font-size: 8px;
    font-weight: 800;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 4px;
    background: rgba(255, 255, 255, 0.05);
    color: rgba(255, 255, 255, 0.5);
    border: 1px solid rgba(255, 255, 255, 0.08);
}

.badge-quality {
    color: #348cfe;
    border-color: rgba(52, 140, 254, 0.3);
    background: rgba(52, 140, 254, 0.05);
}

.badge-type {
    color: #fff;
    background: rgba(52, 140, 254, 0.2);
    border-color: #348cfe;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#050505;
    color:#fff;
    overflow-x:hidden;
}

header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    z-index:999;
    background:rgba(5,5,5,.75);
    backdrop-filter:blur(15px);
    border-bottom:1px solid rgba(255,255,255,.05);
}

.desktop-nav{
    display:flex;
    align-items:center;
    gap:6px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
    padding:6px;
    border-radius:999px;
    backdrop-filter:blur(10px);
}

.desktop-nav a{
    color:#fff;
    text-decoration:none;
    padding:10px 14px;
    border-radius:999px;
    font-size:.75rem;
    font-weight:700;
    transition:.25s;
}

.desktop-nav a:hover{
    background:rgba(255,255,255,.08);
}

.mobile-nav{
    position:fixed;
    left:50%;
    bottom:12px;
    transform:translateX(-50%);
    width:calc(100% - 20px);
    max-width:600px;
    height:64px;
    background:rgba(10,10,10,.92);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.1);
    border-radius:20px;
    display:none;
    align-items:center;
    justify-content:space-around;
    z-index:9999;
    box-shadow:0 10px 40px rgba(0,0,0,.6);
    padding: 0 10px;
    overflow-x:auto;
}

.mobile-nav::-webkit-scrollbar{
    display:none;
}

.mobile-nav-item{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:2px;
    color:rgba(255,255,255,.5);
    text-decoration:none;
    font-size:.6rem;
    font-weight:700;
    transition:.25s;
    flex:0 0 auto;
    height:100%;

    white-space:nowrap;
}

.mobile-nav-item i{
    font-size:1rem;
}

.mobile-nav-item.active,
.mobile-nav-item:hover{
    color:#348cfe;
}

.grid-container{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(160px, 1fr));
    gap:20px;
    padding:20px 0;
}

.card-item{
    position:relative;
    cursor:pointer;
}

.poster-wrapper{
    width:100%;
    aspect-ratio:2/3;
    border-radius:20px;
    overflow:hidden;
    background:#111;
    box-shadow:0 15px 35px rgba(0,0,0,.45);
}

.poster-img{
    width:100%;
    height:100%;
    object-fit:cover;
    transition:transform .35s ease;
}

.card-item:hover .poster-img{
    transform:scale(1.08);
}

.card-hover-info {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.95) 20%, rgba(0,0,0,0.6) 100%);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 15px;
    opacity: 0;
    transition: 0.3s;
    border-radius: 20px;
    z-index: 20;
}

.card-item:hover .card-hover-info {
    opacity: 1;
}

.card-hover-title {
    font-size: 12px;
    font-weight: 900;
    text-transform: uppercase;
    margin-bottom: 5px;

    -webkit-box-orient: vertical;
    overflow: hidden;
}

.card-hover-overview {

    color: rgba(255,255,255,0.7);

    margin-bottom: 10px;
    line-clamp: 3;
    display: -webkit-box;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.card-hover-btn {

    font-size: 10px;
    font-weight: 900;
    padding: 8px;
    border-radius: 10px;
    text-align: center;

}

.pagination{

    align-items:center;
    gap:10px;
    margin-top:40px;
    flex-wrap:wrap;
}

.pagination button,
.pagination a{

.pagination button:hover,

.pagination .active{

.search-modal.active {

.search-modal-input:focus {

}

.search-modal-close:hover {

}

.search-modal-results {

.search-result-item {

}

.search-result-item:hover {

}

.search-result-poster {

.search-result-poster img {

.search-result-info {

    display: flex;
    flex-direction: column;
    justify-content: center;
}

.search-result-title {

    font-size: 14px;

}

.search-result-meta {

}

.search-loading {
    text-align: center;

    color: rgba(255, 255, 255, 0.5);
}

.search-empty {
    text-align: center;

}

.genre-filter-bar {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding: 15px 0;

}

.genre-filter-bar::-webkit-scrollbar {

}

.genre-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.6);
    padding: 8px 16px;
    border-radius: 20px;
    cursor: pointer;
    font-weight: 700;
    font-size: 12px;
    text-transform: uppercase;
    white-space: nowrap;
    transition: 0.3s;
    flex: 0 0 auto;
}

.genre-btn:hover,
.genre-btn.active {
    background: #348cfe;
    border-color: #348cfe;

<script>
const TMDB_API_KEY = '8265bd1679663a7ea12ac168da84d2e8';
const TMDB_BASE_URL = 'https://api.themoviedb.org/3';
const TMDB_IMAGE_BASE = 'https://image.tmdb.org/t/p/w500';

const GENRES = [
    { id: 28, name: 'Acao' },
    { id: 12, name: 'Aventura' },
    { id: 35, name: 'Comedia' },
    { id: 80, name: 'Crime' },
    { id: 18, name: 'Drama' },
    { id: 10751, name: 'Familia' },
    { id: 14, name: 'Fantasia' },
    { id: 27, name: 'Horror' },
    { id: 10749, name: 'Romance' },
    { id: 878, name: 'Ficcao Cientifica' },
    { id: 53, name: 'Thriller' }
];

let currentPage = 1;
let totalPages = 1;
let searchTimeout = null;
let selectedGenre = null;

document.addEventListener('DOMContentLoaded', () => {
    renderGenreFilter();
    loadMovies(1);
    setupSearchModal();
});

function renderGenreFilter() {
    const container = document.getElementById('genreFilter');
    container.innerHTML = '<button class="genre-btn active" onclick="filterByGenre(null)">Todos</button>' + 
        GENRES.map(g => `<button class="genre-btn" onclick="filterByGenre(${g.id})">${g.name}</button>`).join('');
}

function filterByGenre(genreId) {
    selectedGenre = genreId;
    currentPage = 1;
    document.querySelectorAll('.genre-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    loadMovies(1);
}

function openSearchModal() {
    document.getElementById('searchModal').classList.add('active');
    document.getElementById('searchInput').focus();
}

function closeSearchModal() {
    document.getElementById('searchModal').classList.remove('active');
    document.getElementById('searchInput').value = '';
    document.getElementById('searchResults').innerHTML = '';
}

function setupSearchModal() {
    const searchInput = document.getElementById('searchInput');
    const searchResults = document.getElementById('searchResults');
    
    searchInput.addEventListener('input', (e) => {
        const query = e.target.value.trim();
        clearTimeout(searchTimeout);
        if (query.length < 2) {
            searchResults.innerHTML = '';
            return;
        }
        searchResults.innerHTML = '<div class="search-loading"><i class="fas fa-spinner fa-spin"></i> Buscando...</div>';
        searchTimeout = setTimeout(() => {
            performSearch(query);
        }, 300);
    });
    
    document.getElementById('searchModal').addEventListener('click', (e) => {
        if (e.target.id === 'searchModal') {
            closeSearchModal();
        }
    });
    
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            closeSearchModal();
        }
    });
}

async function performSearch(query) {
    try {
        const response = await fetch(`${TMDB_BASE_URL}/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(query)}&language=pt-BR`);
        const data = await response.json();
        const results = data.results.filter(item => item.poster_path).slice(0, 10);
        const searchResults = document.getElementById('searchResults');
        if (results.length === 0) {
            searchResults.innerHTML = '<div class="search-empty">Nenhum resultado encontrado</div>';
            return;
        }
        searchResults.innerHTML = results.map(item => `
            <div class="search-result-item" onclick="window.location.href='assistir?id=${item.id}&type=movie'">
                <div class="search-result-poster">
                    <img src="${TMDB_IMAGE_BASE + item.poster_path}" alt="${item.title}">
                </div>
                <div class="search-result-info">
                    <div class="search-result-title">${item.title}</div>
                    <div class="search-result-meta">Filme • ${(item.release_date || '').split('-')[0]}</div>
                </div>
            </div>
        `).join('');
    } catch (error) {
        console.error('Erro na busca:', error);
        document.getElementById('searchResults').innerHTML = '<div class="search-empty">Erro ao buscar. Tente novamente.</div>';
    }
}

async function loadMovies(page = 1) {
    try {
        let url = `${TMDB_BASE_URL}/movie/popular?api_key=${TMDB_API_KEY}&language=pt-BR&page=${page}`;
        if (selectedGenre) {
            url = `${TMDB_BASE_URL}/discover/movie?api_key=${TMDB_API_KEY}&with_genres=${selectedGenre}&language=pt-BR&page=${page}`;
        }
        const response = await fetch(url);
        const data = await response.json();
        currentPage = page;
        totalPages = data.total_pages > 500 ? 500 : data.total_pages;
        renderMovies(data.results);
        renderPagination();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    } catch (error) {
        console.error('Erro ao carregar filmes:', error);
    }
}

const GENRE_MAP = {
    28: 'Ação', 12: 'Aventura', 16: 'Animação', 35: 'Comédia', 80: 'Crime', 99: 'Documentário', 18: 'Drama', 10751: 'Família', 14: 'Fantasia', 36: 'História', 27: 'Terror', 10402: 'Música', 9648: 'Mistério', 10749: 'Romance', 878: 'Ficção Científica', 10770: 'Cinema TV', 53: 'Suspense', 10752: 'Guerra', 37: 'Faroeste'
};

function renderMovies(movies) {
    const container = document.getElementById('moviesGrid');
    container.innerHTML = movies.filter(m => m.poster_path).map(movie => {
        const rating = Math.round(movie.vote_average * 10);
        const color = rating >= 70 ? '#21d07a' : rating >= 40 ? '#d2d531' : '#db2360';
        const genre = movie.genre_ids ? GENRE_MAP[movie.genre_ids[0]] : 'Geral';
        const year = (movie.release_date || '').split('-')[0];
        
        return `
            <div class="card-item group" onclick="window.location.href='assistir?id=${movie.id}&type=movie'">
                <div class="poster-wrapper relative">
                    <div class="rating-badge">
                        <div class="rating-circle">
                            <svg viewBox="0 0 36 36">
                                <path d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="3"></path>
                                <path d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="${color}" stroke-width="3" stroke-linecap="round" stroke-dasharray="${rating}, 100"></path>
                            </svg>
                            <span class="rating-circle-text">${rating}%</span>
                        </div>
                    </div>
                    <img src="${TMDB_IMAGE_BASE + movie.poster_path}" class="poster-img" alt="${movie.title}">
                    <div class="card-hover-info">
                        <h3 class="card-hover-title">${movie.title}</h3>
                        <p class="card-hover-overview">${movie.overview || 'Sem sinopse disponível.'}</p>
                        <div class="card-hover-btn">Assistir Agora</div>
                    </div>
                </div>
                <div class="mt-4">
                    <h3 class="font-black text-[11px] uppercase tracking-tighter truncate">${movie.title}</h3>
                    <div class="card-badges">
                        <span class="badge badge-type">Filme</span>
                        <span class="badge">${genre}</span>
                        <span class="badge badge-quality">4K</span>
                    </div>
                    <p class="text-[9px] font-bold text-white/30 uppercase mt-1 italic">${year}</p>
                </div>
            </div>
        `;
    }).join('');
}

function renderPagination() {
    const container = document.getElementById('pagination');
    let html = '';
    
    if (currentPage > 1) {
        html += `<button onclick="loadMovies(1)">Primeira</button>`;
        html += `<button onclick="loadMovies(${currentPage - 1})">Anterior</button>`;
    }
    
    for (let i = Math.max(1, currentPage - 2); i <= Math.min(totalPages, currentPage + 2); i++) {
        html += `<button onclick="loadMovies(${i})" class="${i === currentPage ? 'active' : ''}">${i}</button>`;
    }
    
    if (currentPage < totalPages) {
        html += `<button onclick="loadMovies(${currentPage + 1})">Próxima</button>`;
        html += `<button onclick="loadMovies(${totalPages})">Última</button>`;
    }
    
    container.innerHTML = html;
}
</script>
</body>
</html>
