        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Montserrat',sans-serif;
    -webkit-tap-highlight-color:transparent;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#050505;
    color:#fff;
    overflow-x:hidden;
}

header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    z-index:999;
    background:rgba(5,5,5,.75);
    backdrop-filter:blur(15px);
    border-bottom:1px solid rgba(255,255,255,.05);
}

.desktop-nav{
    display:flex;
    align-items:center;
    gap:6px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
    padding:6px;
    border-radius:999px;
    backdrop-filter:blur(10px);
}

.desktop-nav a{
    color:#fff;
    text-decoration:none;
    padding:10px 14px;
    border-radius:999px;
    font-size:.75rem;
    font-weight:700;
    transition:.25s;
}

.desktop-nav a:hover{
    background:rgba(255,255,255,.08);
}

.mobile-nav{
    position:fixed;
    left:50%;
    bottom:12px;
    transform:translateX(-50%);
    width:calc(100% - 20px);
    max-width:600px;
    height:64px;
    background:rgba(10,10,10,.92);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.1);
    border-radius:20px;
    display:none;
    align-items:center;
    justify-content:space-around;
    z-index:9999;
    box-shadow:0 10px 40px rgba(0,0,0,.6);
    padding: 0 10px;
    overflow-x:auto;
}

.mobile-nav::-webkit-scrollbar{
    display:none;
}

.mobile-nav-item{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:2px;
    color:rgba(255,255,255,.5);
    text-decoration:none;
    font-size:.6rem;
    font-weight:700;
    transition:.25s;
    flex:0 0 auto;
    height:100%;
    padding:0 8px;
    white-space:nowrap;
}

.mobile-nav-item i{
    font-size:1rem;
}

.mobile-nav-item.active,
.mobile-nav-item:hover{
    color:#348cfe;
}

.filter-tabs {
    display: flex;
    gap: 12px;
    margin-bottom: 30px;
    flex-wrap: wrap;
}

.filter-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.6);
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 700;
    font-size: 12px;
    text-transform: uppercase;
    transition: 0.3s;
}

.filter-btn:hover,
.filter-btn.active {
    background: #348cfe;
    border-color: #348cfe;
    color: white;
}

.episodes-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 20px;
    padding: 20px 0;
}

.episode-card {
    position: relative;
    cursor: pointer;
    border-radius: 16px;
    overflow: hidden;
    background: #111;
    transition: 0.3s;
    border: 2px solid transparent;
    height: 100%;
}

.episode-card:hover {
    transform: scale(1.05);
    border-color: #348cfe;
}

.episode-poster {
    width: 100%;
    aspect-ratio: 2/3;
    object-fit: cover;
    display: block;
}

.episode-info {
    padding: 15px;
    background: linear-gradient(to top, rgba(0,0,0,0.95), rgba(0,0,0,0.5));
}

.episode-type-badge {
    display: inline-block;
    background: #ef4444;
    color: white;
    font-size: 9px;
    font-weight: 900;
    padding: 4px 8px;
    border-radius: 4px;
    text-transform: uppercase;
    margin-bottom: 8px;
}

.episode-type-badge.anime {
    background: #8b5cf6;
}

.episode-type-badge.dorama {
    background: #ec4899;
}

.episode-type-badge.serie {
    background: #06b6d4;
}

.episode-date {
    font-size: 9px;
    color: rgba(255,255,255,0.6);
    margin-bottom: 4px;
}

.episode-code {
    font-size: 11px;
    font-weight: 900;
    color: #348cfe;
    margin-bottom: 8px;
}

.episode-title {
    font-size: 13px;
    font-weight: 900;
    text-transform: uppercase;
    line-clamp: 2;
    display: -webkit-box;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 8px;
}

.episode-episode {
    font-size: 10px;
    color: rgba(255,255,255,0.7);
}

.new-badge {
    position: absolute;
    top: 10px;
    right: 10px;
    background: #22c55e;
    color: white;
    font-size: 9px;
    font-weight: 900;
    padding: 6px 10px;
    border-radius: 6px;
    text-transform: uppercase;
}

.pagination {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 40px;
    flex-wrap: wrap;
}

.pagination a,
.pagination button {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: white;
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 700;
    font-size: 11px;
    transition: 0.3s;
    text-decoration: none;
}

.pagination a:hover,
.pagination button:hover {
    background: #348cfe;
    border-color: #348cfe;
}

.pagination .active {
    background: #348cfe;
    border-color: #348cfe;
}

.nav-controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
    gap: 20px;
}

.nav-btn {
    background: rgba(52,140,254,0.2);
    border: 1px solid #348cfe;
    color: #348cfe;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 700;
    font-size: 12px;
    text-transform: uppercase;
    transition: 0.3s;
}

.nav-btn:hover {
    background: #348cfe;
    color: white;
}

.nav-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
}

.loading {
    text-align: center;
    padding: 40px;
    color: rgba(255,255,255,0.5);
}

@media(max-width:768px){
    body{
        padding-bottom:85px;
    }
    .episodes-grid{
        grid-template-columns:repeat(auto-fill, minmax(140px, 1fr));
        gap:12px;
    }
    .mobile-nav{
        display:flex;
    }
    header nav{
        display:none !important;
    }
}
    </style>

<main class="flex-1 pt-24 lg:pt-32">
    <div class="container xl:max-w-[1400px] mx-auto px-4 py-8">
        <h1 class="text-4xl font-black mb-8 flex items-center gap-3">
            <div class="w-2 h-8 bg-lead rounded-full shadow-[0_0_15px_#348cfe]"></div>
            Episódios Recentes
        </h1>
        
        <div class="filter-tabs">
            <button class="filter-btn active" onclick="filterEpisodes('todos')">Todos</button>
            <button class="filter-btn" onclick="filterEpisodes('series')">Séries</button>
            <button class="filter-btn" onclick="filterEpisodes('animes')">Animes</button>
            <button class="filter-btn" onclick="filterEpisodes('doramas')">Doramas</button>
        </div>

        <div class="nav-controls">
            <button class="nav-btn" id="prevBtn" onclick="previousPage()" disabled><i class="fas fa-chevron-left"></i> Anterior</button>
            <span id="pageInfo" style="font-weight: 700; font-size: 14px;">Página 1</span>
            <button class="nav-btn" id="nextBtn" onclick="nextPage()">Próxima <i class="fas fa-chevron-right"></i></button>
        </div>
        
        <div class="episodes-grid" id="episodesGrid"></div>
        
        <div class="pagination" id="pagination"></div>
    </div>
</main>

<footer class="py-12 border-t border-white/5 text-center"><p class="text-[10px] font-black text-white/30 uppercase tracking-[0.3em]">© 2026 Iracemaflix</p></footer>

<script>
const TMDB_API_KEY = '8265bd1679663a7ea12ac168da84d2e8';
const TMDB_BASE_URL = 'https://api.themoviedb.org/3';
const TMDB_IMAGE_BASE = 'https://image.tmdb.org/t/p/w500';

let currentPage = 1;
let currentFilter = 'todos';
let allEpisodes = [];
let filteredEpisodes = [];
let isLoading = false;

document.addEventListener('DOMContentLoaded', () => {
    loadEpisodes();
});

function filterEpisodes(type) {
    currentFilter = type;
    currentPage = 1;
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    applyFilter();
}

function applyFilter() {
    if (currentFilter === 'todos') {
        filteredEpisodes = [...allEpisodes];
    } else if (currentFilter === 'animes') {
        filteredEpisodes = allEpisodes.filter(e => e.genre_ids && e.genre_ids.includes(16));
    } else if (currentFilter === 'series') {
        filteredEpisodes = allEpisodes.filter(e => !e.genre_ids || !e.genre_ids.includes(16));
    } else if (currentFilter === 'doramas') {
        filteredEpisodes = allEpisodes.filter(e => e.origin_country && e.origin_country.includes('KR'));
    }
    renderEpisodes();
}

async function loadEpisodes() {
    try {
        const container = document.getElementById('episodesGrid');
        container.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Carregando episódios...</div>';
        
        const response = await fetch(`${TMDB_BASE_URL}/tv/on_the_air?api_key=${TMDB_API_KEY}&language=pt-BR&page=1`);
        const data = await response.json();
        allEpisodes = data.results.filter(s => s.poster_path) || [];
        applyFilter();
    } catch (error) {
        console.error('Erro ao carregar episódios:', error);
        document.getElementById('episodesGrid').innerHTML = '<div class="loading">Erro ao carregar episódios</div>';
    }
}

function renderEpisodes() {
    const container = document.getElementById('episodesGrid');
    const itemsPerPage = 12;
    const start = (currentPage - 1) * itemsPerPage;
    const end = start + itemsPerPage;
    const paged = filteredEpisodes.slice(start, end);
    
    const totalPages = Math.ceil(filteredEpisodes.length / itemsPerPage);
    document.getElementById('pageInfo').textContent = `Página ${currentPage} de ${totalPages}`;
    document.getElementById('prevBtn').disabled = currentPage === 1;
    document.getElementById('nextBtn').disabled = currentPage === totalPages;
    
    if (paged.length === 0) {
        container.innerHTML = '<div class="loading">Nenhum episódio encontrado</div>';
        return;
    }
    
    container.innerHTML = paged.map((show, idx) => {
        const isNew = idx < 4;
        const type = show.genre_ids && show.genre_ids.includes(16) ? 'anime' : (show.origin_country && show.origin_country.includes('KR') ? 'dorama' : 'serie');
        const date = new Date(show.last_episode_to_air?.air_date || show.first_air_date || '').toLocaleDateString('pt-BR');
        const episodeCode = show.last_episode_to_air ? `T${show.last_episode_to_air.season_number}E${show.last_episode_to_air.episode_number}` : 'N/A';
        const episodeName = show.last_episode_to_air?.name || 'Novo episódio';
        
        return `
            <div class="episode-card" onclick="window.location.href='assistir?id=${show.id}&type=tv'">
                ${isNew ? '<div class="new-badge">Novo</div>' : ''}
                <img src="${TMDB_IMAGE_BASE + show.poster_path}" class="episode-poster" alt="${show.name}" onerror="this.src='https://via.placeholder.com/300x450?text=Sem+Poster'">
                <div class="episode-info">
                    <div class="episode-type-badge ${type}">${type.toUpperCase()}</div>
                    <div class="episode-date">${date}</div>
                    <div class="episode-code">${episodeCode}</div>
                    <div class="episode-title">${show.name}</div>
                    <div class="episode-episode">${episodeName}</div>
                </div>
            </div>
        `;
    }).join('');
}

function nextPage() {
    const itemsPerPage = 12;
    const totalPages = Math.ceil(filteredEpisodes.length / itemsPerPage);
    if (currentPage < totalPages) {
        currentPage++;
        renderEpisodes();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
}

function previousPage() {
    if (currentPage > 1) {
        currentPage--;
        renderEpisodes();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
}
</script>
