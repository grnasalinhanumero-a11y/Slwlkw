<!DOCTYPE html>
<html lang="pt-br" class="dark h-full antialiased scroll-smooth">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Iracemaflix - Assistir Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Removido o defer para garantir que o Alpine esteja disponível imediatamente -->
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { lead: '#348cfe', 'dark-bg': 'rgb(5,5,5)' }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Montserrat',sans-serif; }
        body { background:#050505; color:#fff; overflow-x:hidden; }
        .no-scrollbar::-webkit-scrollbar { display:none; }
        .no-scrollbar { scrollbar-width:none; -ms-overflow-style:none; }
        .player-btn.active { background: #348cfe; color: white; border-color: #348cfe; box-shadow: 0 0 15px rgba(52, 140, 254, 0.4); }
        .episode-card.active { border-color: #348cfe; background: rgba(52, 140, 254, 0.1); }
        .episode-card.active h3 { color: #348cfe; }
        iframe { background: #000; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="flex flex-col min-h-screen" x-data="{ seasonOpen: false, currentSeasonName: 'Temporada 1' }">

<header class="fixed top-0 left-0 w-full z-50 bg-[rgb(5,5,5)]/80 backdrop-blur-md border-b border-white/5">
    <div class="container xl:max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
        <a href="/" class="block font-black text-2xl tracking-tighter uppercase leading-none text-white">Iracema<span class="text-lead">flix</span></a>
        <a href="/" class="bg-white/5 px-4 py-2 rounded-full text-[10px] font-black tracking-widest hover:bg-lead transition-all cursor-pointer flex items-center gap-2">
            <i class="fas fa-arrow-left"></i> VOLTAR
        </a>
    </div>
</header>

<main class="flex-1 pt-20 lg:pt-24">
    <div class="w-full bg-black shadow-2xl overflow-hidden relative" id="mainPlayerArea">
        <div class="aspect-video w-full max-w-5xl mx-auto bg-black relative group overflow-hidden">
            <div id="fakePlayer" class="absolute inset-0 z-20 flex items-center justify-center cursor-pointer transition-all duration-700 bg-cover bg-center" onclick="startPlayer()">
                <div class="absolute inset-0 bg-black/60 group-hover:bg-black/40 transition-all duration-500"></div>
                <div class="relative z-30 flex flex-col items-center gap-6 transform group-hover:scale-110 transition-transform duration-500">
                    <div class="w-20 h-20 md:w-28 md:h-28 bg-lead rounded-full flex items-center justify-center shadow-[0_0_50px_rgba(52,140,254,0.6)]">
                        <i class="fas fa-play text-white text-3xl md:text-5xl ml-2"></i>
                    </div>
                    <span class="text-white font-black uppercase tracking-[0.3em] text-xs md:text-sm drop-shadow-lg">Reproduzir agora</span>
                </div>
            </div>
            <div id="playerFrame" class="w-full h-full hidden opacity-0 transition-opacity duration-1000"></div>
        </div>
        
        <div id="playerControls" class="bg-white/5 border-t border-white/5 py-4 hidden">
            <div class="container xl:max-w-7xl mx-auto px-4 flex flex-wrap gap-3 justify-center">
                <button onclick="changePlayer(1)" id="btn-p1" class="player-btn px-6 py-2.5 rounded-xl border border-white/10 text-xs font-black uppercase tracking-widest transition-all hover:bg-white/10 flex items-center gap-2">
                    <i class="fas fa-play"></i> Player 1
                </button>
                <button onclick="changePlayer(2)" id="btn-p2" class="player-btn px-6 py-2.5 rounded-xl border border-white/10 text-xs font-black uppercase tracking-widest transition-all hover:bg-white/10 flex items-center gap-2">
                    <i class="fas fa-play"></i> Player 2
                </button>
            </div>
        </div>
    </div>

    <div class="container xl:max-w-7xl mx-auto px-4 py-8">
        <div class="flex flex-col lg:flex-row gap-10">
            <div class="flex-1">
                <div class="flex items-center gap-3 mb-4 text-[11px] font-black uppercase tracking-widest text-lead" id="contentGenres">...</div>
                <h1 id="contentTitle" class="text-3xl md:text-5xl font-black mb-4 leading-tight">...</h1>
                
                <div class="flex flex-wrap items-center gap-4 mb-6">
                    <div class="flex items-center gap-2 bg-white/5 px-3 py-1.5 rounded-lg border border-white/5">
                        <i class="fas fa-star text-yellow-500 text-xs"></i>
                        <span id="contentRating" class="font-black text-sm text-white/80">0.0</span>
                    </div>
                    <span id="contentYear" class="text-white/40 font-bold text-sm">2026</span>
                    <span id="contentRuntime" class="text-white/40 font-bold text-sm">...</span>
                    <span class="bg-lead/10 text-lead text-[10px] font-black px-2 py-1 rounded uppercase tracking-widest text-center">Full HD</span>
                </div>

                <div class="flex flex-wrap items-center gap-3 mb-10">
                    <button onclick="openTrailer()" class="flex items-center gap-2 bg-white/5 hover:bg-white/10 px-5 py-2.5 rounded-xl border border-white/10 text-[10px] font-black uppercase tracking-widest transition-all">
                        <i class="fas fa-video text-lead"></i> Trailers
                    </button>
                    <button onclick="shareContent()" class="flex items-center gap-2 bg-white/5 hover:bg-white/10 px-5 py-2.5 rounded-xl border border-white/10 text-[10px] font-black uppercase tracking-widest transition-all">
                        <i class="fas fa-share-alt text-lead"></i> Compartilhar
                    </button>
                </div>

                <div class="mb-10">
                    <h2 class="text-xs font-black uppercase tracking-[0.2em] text-white/30 mb-4">Sinopse</h2>
                    <p id="contentOverview" class="text-slate-300 text-base md:text-lg leading-relaxed"></p>
                </div>
                
                <div id="seriesControls" class="hidden mb-12">
                    <div class="flex items-center justify-between mb-8 border-b border-white/5 pb-4">
                        <h2 class="text-xl font-black uppercase tracking-tight flex items-center gap-3">
                            <div class="w-1.5 h-6 bg-lead rounded-full"></div>
                            Episódios
                        </h2>
                        
                        <div class="relative">
                            <button @click="seasonOpen = !seasonOpen" class="bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-xs font-black uppercase tracking-widest flex items-center gap-3 hover:bg-white/10 transition-all outline-none">
                                <span x-text="currentSeasonName">Temporada 1</span>
                                <i class="fas fa-chevron-down text-[10px] transition-transform" :class="seasonOpen ? 'rotate-180' : ''"></i>
                            </button>
                            <div x-show="seasonOpen" @click.away="seasonOpen = false" x-cloak x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100" class="absolute right-0 mt-2 w-48 bg-[#111] border border-white/10 rounded-2xl shadow-2xl z-50 overflow-hidden py-2" id="seasonDropdownList">
                            </div>
                        </div>
                    </div>
                    <div id="episodesList" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4"></div>
                </div>
            </div>

            <div class="lg:w-80 shrink-0">
                <div class="bg-white/5 rounded-3xl p-6 border border-white/5 sticky top-28">
                    <h2 class="text-sm font-black mb-6 uppercase tracking-widest text-white/40 border-b border-white/5 pb-4">Elenco Principal</h2>
                    <div id="castList" class="space-y-5"></div>
                </div>
            </div>
        </div>

        <div class="mt-16">
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-2xl font-black flex items-center gap-3">
                    <div class="w-2 h-8 bg-lead rounded-full shadow-[0_0_15px_#348cfe]"></div> 
                    Você também pode gostar
                </h2>
            </div>
            <div id="relatedCarousel" class="flex gap-5 overflow-x-auto no-scrollbar pb-6"></div>
        </div>
    </div>
</main>

<div id="trailerModal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/95 backdrop-blur-sm" onclick="closeTrailer()"></div>
    <div class="relative z-10 w-full max-w-4xl aspect-video bg-black rounded-3xl overflow-hidden shadow-2xl border border-white/10">
        <button onclick="closeTrailer()" class="absolute top-4 right-4 z-20 w-10 h-10 bg-black/50 hover:bg-lead rounded-full flex items-center justify-center transition-all">
            <i class="fas fa-times text-white"></i>
        </button>
        <div id="trailerFrame" class="w-full h-full"></div>
    </div>
</div>

<footer class="py-12 border-t border-white/5 text-center">
    <p class="text-[10px] font-black text-white/30 uppercase tracking-[0.3em]">© 2026 Iracemaflix</p>
</footer>

<script>
const TMDB_API_KEY = '8265bd1679663a7ea12ac168da84d2e8';
const TMDB_BASE_URL = 'https://api.themoviedb.org/3';
const TMDB_IMAGE_BASE = 'https://image.tmdb.org/t/p/w500';
const TMDB_BACKDROP_BASE = 'https://image.tmdb.org/t/p/w1280';

const urlParams = new URLSearchParams(window.location.search);
const contentId = urlParams.get('id');
const contentType = urlParams.get('type');

let currentSeason = 1;
let currentEpisode = 1;
let activePlayer = 1;
let trailerKey = '';
let isPlayerStarted = false;

if (!contentId || !contentType) {
    window.location.href = '/';
}

async function loadContentDetails() {
    try {
        const response = await fetch(`${TMDB_BASE_URL}/${contentType}/${contentId}?api_key=${TMDB_API_KEY}&language=pt-BR&append_to_response=credits,recommendations,videos`);
        const data = await response.json();

        document.title = `${data.title || data.name} - Iracemaflix`;
        document.getElementById('contentTitle').textContent = data.title || data.name;
        document.getElementById('contentOverview').textContent = data.overview || 'Sinopse não disponível.';
        document.getElementById('contentRating').textContent = data.vote_average.toFixed(1);
        document.getElementById('contentYear').textContent = (data.release_date || data.first_air_date || '').split('-')[0];
        document.getElementById('contentGenres').textContent = data.genres.map(g => g.name).join(' • ');
        
        const backdropUrl = TMDB_BACKDROP_BASE + data.backdrop_path;
        document.getElementById('fakePlayer').style.backgroundImage = `url('${backdropUrl}')`;
        
        if (contentType === 'movie') {
            const runtime = data.runtime || 0;
            const hours = Math.floor(runtime / 60);
            const minutes = runtime % 60;
            document.getElementById('contentRuntime').textContent = `${hours}h ${minutes}m`;
        } else {
            document.getElementById('contentRuntime').textContent = `${data.number_of_seasons} Temporada(s)`;
            document.getElementById('seriesControls').classList.remove('hidden');
            setupSeries(data);
        }

        const trailer = data.videos.results.find(v => v.type === 'Trailer' && v.site === 'YouTube') || data.videos.results[0];
        if (trailer) trailerKey = trailer.key;

        renderCast(data.credits.cast.slice(0, 5));
        renderRelated(data.recommendations.results.slice(0, 10));
    } catch (error) {
        console.error(error);
    }
}

function startPlayer() {
    isPlayerStarted = true;
    const fakePlayer = document.getElementById('fakePlayer');
    const playerFrame = document.getElementById('playerFrame');
    const playerControls = document.getElementById('playerControls');
    
    fakePlayer.classList.add('opacity-0', 'pointer-events-none');
    setTimeout(() => {
        fakePlayer.classList.add('hidden');
        playerFrame.classList.remove('hidden');
        setTimeout(() => playerFrame.classList.add('opacity-100'), 50);
        playerControls.classList.remove('hidden');
        changePlayer(activePlayer);
    }, 700);
}

function changePlayer(playerNum) {
    activePlayer = playerNum;
    document.querySelectorAll('.player-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById(`btn-p${playerNum}`).classList.add('active');
    
    const playerFrame = document.getElementById('playerFrame');
    let embedUrl = '';
    
    if (activePlayer === 1) {
        if (contentType === 'movie') {
            embedUrl = `https://superflixapi.asia/filme/${contentId}`;
        } else {
            embedUrl = `https://superflixapi.asia/serie/${contentId}/${currentSeason}/${currentEpisode}`;
        }
    } else {
        if (contentType === 'movie') {
            embedUrl = `https://warezcdn.lat/filme/${contentId}`;
        } else {
            embedUrl = `https://warezcdn.lat/serie/${contentId}/${currentSeason}/${currentEpisode}`;
        }
    }
    
    playerFrame.innerHTML = `<iframe src="${embedUrl}" class="w-full h-full" frameborder="0" allowfullscreen scrolling="no"></iframe>`;
}

function setupSeries(data) {
    const dropdown = document.getElementById('seasonDropdownList');
    dropdown.innerHTML = data.seasons
        .filter(s => s.season_number > 0)
        .map(s => `
            <button onclick="window.selectSeason(${s.season_number}, '${s.name}')" class="w-full text-left px-5 py-2.5 text-[10px] font-black uppercase tracking-widest hover:bg-lead hover:text-white transition-all">
                ${s.name}
            </button>
        `).join('');

    loadEpisodes(contentId, 1);
}

// Tornando global para que o onclick no HTML funcione
window.selectSeason = function(num, name) {
    currentSeason = num;
    // Usando document.querySelector para acessar o Alpine
    const body = document.querySelector('body');
    if (body.__x) {
        body.__x.$data.currentSeasonName = name;
        body.__x.$data.seasonOpen = false;
    }
    loadEpisodes(contentId, num);
};

async function loadEpisodes(id, seasonNumber) {
    const episodesList = document.getElementById('episodesList');
    episodesList.innerHTML = '<div class="col-span-full py-10 flex justify-center"><i class="fas fa-circle-notch fa-spin text-lead text-2xl"></i></div>';
    
    try {
        const response = await fetch(`${TMDB_BASE_URL}/tv/${id}/season/${seasonNumber}?api_key=${TMDB_API_KEY}&language=pt-BR`);
        const data = await response.json();
        
        episodesList.innerHTML = data.episodes.map(ep => `
            <div class="episode-card group cursor-pointer border border-white/5 rounded-2xl p-3 hover:border-lead/50 transition-all bg-white/[0.02]" id="ep-${ep.episode_number}" onclick="selectEpisode(${seasonNumber}, ${ep.episode_number})">
                <div class="aspect-video rounded-xl overflow-hidden mb-3 bg-black relative">
                    <img src="${ep.still_path ? TMDB_IMAGE_BASE + ep.still_path : 'https://placehold.co/300x170/111/FFF?text=EP+' + ep.episode_number}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500 opacity-60">
                    <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                        <i class="fas fa-play text-white text-xl"></i>
                    </div>
                </div>
                <h3 class="text-[11px] font-black truncate uppercase tracking-tight transition-colors">${ep.episode_number}. ${ep.name}</h3>
                <p class="text-[9px] font-bold text-white/30 uppercase mt-1 tracking-widest">${ep.runtime || 0} MINUTOS</p>
            </div>
        `).join('');
        
        if (data.episodes.length > 0) {
            const firstEp = data.episodes[0].episode_number;
            currentEpisode = firstEp;
            document.getElementById(`ep-${firstEp}`).classList.add('active');
            
            // Se o player já estiver rodando, recarrega o primeiro episódio da nova temporada
            if (isPlayerStarted) {
                changePlayer(activePlayer);
            }
        }
    } catch (error) {
        console.error(error);
    }
}

function selectEpisode(season, episode) {
    currentSeason = season;
    currentEpisode = episode;
    
    document.querySelectorAll('.episode-card').forEach(el => el.classList.remove('active'));
    const activeEp = document.getElementById(`ep-${episode}`);
    if (activeEp) activeEp.classList.add('active');
    
    if (isPlayerStarted) {
        changePlayer(activePlayer);
        document.getElementById('mainPlayerArea').scrollIntoView({ behavior: 'smooth' });
    } else {
        startPlayer();
    }
}

function openTrailer() {
    if (!trailerKey) {
        alert('Trailer não disponível para este conteúdo.');
        return;
    }
    const modal = document.getElementById('trailerModal');
    const frame = document.getElementById('trailerFrame');
    frame.innerHTML = `<iframe src="https://www.youtube.com/embed/${trailerKey}?autoplay=1" class="w-full h-full" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
    modal.classList.remove('hidden');
    modal.classList.add('flex');
}

function closeTrailer() {
    const modal = document.getElementById('trailerModal');
    const frame = document.getElementById('trailerFrame');
    frame.innerHTML = '';
    modal.classList.add('hidden');
    modal.classList.remove('flex');
}

function shareContent() {
    if (navigator.share) {
        navigator.share({
            title: document.title,
            url: window.location.href
        }).catch(console.error);
    } else {
        const dummy = document.createElement('input');
        document.body.appendChild(dummy);
        dummy.value = window.location.href;
        dummy.select();
        document.execCommand('copy');
        document.body.removeChild(dummy);
        alert('Link copiado para a área de transferência!');
    }
}

function renderCast(cast) {
    const container = document.getElementById('castList');
    if (!cast.length) {
        container.innerHTML = '<p class="text-white/20 text-xs font-bold uppercase tracking-widest">Informação indisponível</p>';
        return;
    }
    container.innerHTML = cast.map(person => `
        <div class="flex items-center gap-4 group">
            <div class="w-11 h-11 rounded-full overflow-hidden bg-black border-2 border-white/5 group-hover:border-lead transition-all shrink-0">
                <img src="${person.profile_path ? TMDB_IMAGE_BASE + person.profile_path : 'https://placehold.co/100x100/111/FFF?text=?'}" class="w-full h-full object-cover">
            </div>
            <div class="min-w-0">
                <h3 class="text-[11px] font-black truncate text-white/90 uppercase tracking-tight">${person.name}</h3>
                <p class="text-[9px] font-bold text-white/30 truncate uppercase tracking-widest">${person.character}</p>
            </div>
        </div>
    `).join('');
}

function renderRelated(items) {
    const container = document.getElementById('relatedCarousel');
    if (!items.length) {
        container.innerHTML = '<p class="text-white/20 text-xs font-bold uppercase tracking-widest py-10">Nenhum conteúdo relacionado encontrado</p>';
        return;
    }
    container.innerHTML = items.map(item => `
        <div class="flex-shrink-0 w-32 md:w-40 cursor-pointer group" onclick="window.location.href='assistir.html?id=${item.id}&type=${contentType}'">
            <div class="aspect-[2/3] rounded-2xl overflow-hidden mb-3 bg-black relative shadow-lg">
                <img src="${TMDB_IMAGE_BASE + item.poster_path}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-3">
                    <span class="text-[9px] font-black text-white uppercase tracking-widest">Assistir Agora</span>
                </div>
            </div>
            <h3 class="text-[11px] font-black truncate uppercase tracking-tight">${item.title || item.name}</h3>
            <p class="text-[9px] font-bold text-white/30 uppercase mt-1 tracking-widest">${(item.release_date || item.first_air_date || '').split('-')[0]}</p>
        </div>
    `).join('');
}

loadContentDetails();
</script>
</body>
</html>
