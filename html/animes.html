    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Montserrat',sans-serif;
    -webkit-tap-highlight-color:transparent;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#050505;
    color:#fff;
    overflow-x:hidden;
}

header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    z-index:999;
    background:rgba(5,5,5,.75);
    backdrop-filter:blur(15px);
    border-bottom:1px solid rgba(255,255,255,.05);
}

.desktop-nav{
    display:flex;
    align-items:center;
    gap:6px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
    padding:6px;
    border-radius:999px;
    backdrop-filter:blur(10px);
}

.desktop-nav a{
    color:#fff;
    text-decoration:none;
    padding:10px 14px;
    border-radius:999px;
    font-size:.75rem;
    font-weight:700;
    transition:.25s;
}

.desktop-nav a:hover{
    background:rgba(255,255,255,.08);
}

.mobile-nav{
    position:fixed;
    left:50%;
    bottom:12px;
    transform:translateX(-50%);
    width:calc(100% - 20px);
    max-width:600px;
    height:64px;
    background:rgba(10,10,10,.92);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.1);
    border-radius:20px;
    display:none;
    align-items:center;
    justify-content:space-around;
    z-index:9999;
    box-shadow:0 10px 40px rgba(0,0,0,.6);
    padding: 0 10px;
    overflow-x:auto;
}

.mobile-nav::-webkit-scrollbar{
    display:none;
}

.mobile-nav-item{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:2px;
    color:rgba(255,255,255,.5);
    text-decoration:none;
    font-size:.6rem;
    font-weight:700;
    transition:.25s;
    flex:0 0 auto;
    height:100%;
    padding:0 8px;
    white-space:nowrap;
}

.mobile-nav-item i{
    font-size:1rem;
}

.mobile-nav-item.active,
.mobile-nav-item:hover{
    color:#348cfe;
}

.grid-container{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(160px, 1fr));
    gap:20px;
    padding:20px 0;
}

.card-item{
    position:relative;
    cursor:pointer;
}

.poster-wrapper{
    width:100%;
    aspect-ratio:2/3;
    border-radius:20px;
    overflow:hidden;
    background:#111;
    box-shadow:0 15px 35px rgba(0,0,0,.45);
}

.poster-img{
    width:100%;
    height:100%;
    object-fit:cover;
    transition:transform .35s ease;
}

.card-item:hover .poster-img{
    transform:scale(1.08);
}

.card-hover-info {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.95) 20%, rgba(0,0,0,0.6) 100%);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 15px;
    opacity: 0;
    transition: 0.3s;
    border-radius: 20px;
    z-index: 20;
}

.card-item:hover .card-hover-info {
    opacity: 1;
}

.card-hover-title {
    font-size: 12px;
    font-weight: 900;
    text-transform: uppercase;
    margin-bottom: 5px;
    line-clamp: 2;
    display: -webkit-box;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.card-hover-overview {
    font-size: 9px;
    color: rgba(255,255,255,0.7);
    line-height: 1.4;
    margin-bottom: 10px;
    line-clamp: 3;
    display: -webkit-box;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.card-hover-btn {
    background: #348cfe;
    color: white;
    font-size: 10px;
    font-weight: 900;
    padding: 8px;
    border-radius: 10px;
    text-align: center;
    text-transform: uppercase;
}

.pagination{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    margin-top:40px;
    flex-wrap:wrap;
}

.pagination button,
.pagination a{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    color:#fff;
    padding:10px 14px;
    border-radius:8px;
    cursor:pointer;
    transition:.25s;
    font-weight:700;
    font-size:12px;
}

.pagination button:hover,
.pagination a:hover{
    background:#348cfe;
    border-color:#348cfe;
}

.pagination .active{
    background:#348cfe;
    border-color:#348cfe;
}

.genre-filter-bar {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding: 15px 0;
    margin-bottom: 25px;
    scroll-behavior: smooth;
}

.genre-filter-bar::-webkit-scrollbar {
    display: none;
}

.genre-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.6);
    padding: 8px 16px;
    border-radius: 20px;
    cursor: pointer;
    font-weight: 700;
    font-size: 12px;
    text-transform: uppercase;
    white-space: nowrap;
    transition: 0.3s;
    flex: 0 0 auto;
}

.genre-btn:hover,
.genre-btn.active {
    background: #348cfe;
    border-color: #348cfe;
    color: white;
}

@media(max-width:768px){
    body{
        padding-bottom:85px;
    }
    .grid-container{
        grid-template-columns:repeat(auto-fill, minmax(120px, 1fr));
        gap:12px;
    }
    .mobile-nav{
        display:flex;
    }
    header nav{
        display:none !important;
    }
}
    </style>

<main class="flex-1 pt-24 lg:pt-32">
    <div class="container xl:max-w-[1400px] mx-auto px-4 py-8">
        <h1 class="text-4xl font-black mb-8 flex items-center gap-3">
            <div class="w-2 h-8 bg-lead rounded-full shadow-[0_0_15px_#348cfe]"></div>
            Animes
        </h1>
        
        <div class="genre-filter-bar" id="genreFilter"></div>
        
        <div class="grid-container" id="animesGrid"></div>
        
        <div class="pagination" id="pagination"></div>
    </div>
</main>

<footer class="py-12 border-t border-white/5 text-center"><p class="text-[10px] font-black text-white/30 uppercase tracking-[0.3em]">© 2026 Iracemaflix</p></footer>

<script>
const TMDB_API_KEY = '8265bd1679663a7ea12ac168da84d2e8';
const TMDB_BASE_URL = 'https://api.themoviedb.org/3';
const TMDB_IMAGE_BASE = 'https://image.tmdb.org/t/p/w500';

const ANIME_GENRES = [
    { id: 10759, name: 'Ação & Aventura' },
    { id: 16, name: 'Animação' },
    { id: 35, name: 'Comédia' },
    { id: 10765, name: 'Sci-Fi & Fantasy' },
    { id: 18, name: 'Drama' },
    { id: 9648, name: 'Mistério' },
    { id: 10762, name: 'Kids' }
];

let currentPage = 1;
let totalPages = 1;
let selectedGenre = null;

document.addEventListener('DOMContentLoaded', () => {
    renderGenreFilter();
    loadAnimes(1);
});

function renderGenreFilter() {
    const container = document.getElementById('genreFilter');
    container.innerHTML = '<button class="genre-btn active" onclick="filterByGenre(null)">Todos</button>' + 
        ANIME_GENRES.map(g => `<button class="genre-btn" onclick="filterByGenre(${g.id})">${g.name}</button>`).join('');
}

function filterByGenre(genreId) {
    selectedGenre = genreId;
    currentPage = 1;
    document.querySelectorAll('.genre-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    loadAnimes(1);
}

async function loadAnimes(page = 1) {
    try {
        // ID 16 é o gênero Anime/Animação no TMDB
        let genres = '16';
        if (selectedGenre && selectedGenre !== 16) {
            genres = `16,${selectedGenre}`;
        }
        
        let url = `${TMDB_BASE_URL}/discover/tv?api_key=${TMDB_API_KEY}&with_genres=${genres}&with_original_language=ja&language=pt-BR&page=${page}`;
        
        const response = await fetch(url);
        const data = await response.json();
        currentPage = page;
        totalPages = data.total_pages > 500 ? 500 : data.total_pages;
        renderAnimes(data.results);
        renderPagination();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    } catch (error) {
        console.error('Erro ao carregar animes:', error);
    }
}

function renderAnimes(animes) {
    const container = document.getElementById('animesGrid');
    container.innerHTML = animes.filter(a => a.poster_path).map(anime => `
        <div class="card-item group" onclick="window.location.href='assistir?id=${anime.id}&type=tv'">
            <div class="poster-wrapper relative">
                <img src="${TMDB_IMAGE_BASE + anime.poster_path}" class="poster-img" alt="${anime.name}">
                <div class="card-hover-info">
                    <h3 class="card-hover-title">${anime.name}</h3>
                    <p class="card-hover-overview">${anime.overview || 'Sem sinopse disponível.'}</p>
                    <div class="card-hover-btn">Assistir Agora</div>
                </div>
            </div>
            <div class="mt-4">
                <h3 class="font-black text-[11px] uppercase tracking-tighter truncate">${anime.name}</h3>
                <p class="text-[9px] font-bold text-white/30 uppercase mt-1 italic">${(anime.first_air_date || '').split('-')[0]}</p>
            </div>
        </div>
    `).join('');
}

function renderPagination() {
    const container = document.getElementById('pagination');
    let html = '';
    if (currentPage > 1) html += `<button onclick="loadAnimes(${currentPage - 1})">Anterior</button>`;
    for (let i = Math.max(1, currentPage - 2); i <= Math.min(totalPages, currentPage + 2); i++) {
        html += `<button onclick="loadAnimes(${i})" class="${i === currentPage ? 'active' : ''}">${i}</button>`;
    }
    if (currentPage < totalPages) html += `<button onclick="loadAnimes(${currentPage + 1})">Próxima</button>`;
    container.innerHTML = html;
}
</script>
