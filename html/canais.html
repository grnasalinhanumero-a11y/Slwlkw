<div id="passwordModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden z-[10000] flex items-center justify-center">
    <div class="bg-gradient-to-b from-[rgb(20,20,20)] to-[rgb(10,10,10)] border border-white/10 rounded-3xl p-8 w-96 max-w-[90%] shadow-2xl">
        <h2 class="text-2xl font-black text-white mb-2 text-center">Conteúdo Adulto</h2>
        <p class="text-white/60 text-center text-sm mb-6">Digite a senha de 4 dígitos para continuar</p>
        
        <div class="flex gap-3 justify-center mb-6">
            <input type="password" id="passwordInput1" class="w-12 h-12 bg-white/5 border border-white/20 rounded-lg text-center text-white font-bold text-xl focus:outline-none focus:border-lead focus:bg-lead/10 transition" maxlength="1" inputmode="numeric">
            <input type="password" id="passwordInput2" class="w-12 h-12 bg-white/5 border border-white/20 rounded-lg text-center text-white font-bold text-xl focus:outline-none focus:border-lead focus:bg-lead/10 transition" maxlength="1" inputmode="numeric">
            <input type="password" id="passwordInput3" class="w-12 h-12 bg-white/5 border border-white/20 rounded-lg text-center text-white font-bold text-xl focus:outline-none focus:border-lead focus:bg-lead/10 transition" maxlength="1" inputmode="numeric">
            <input type="password" id="passwordInput4" class="w-12 h-12 bg-white/5 border border-white/20 rounded-lg text-center text-white font-bold text-xl focus:outline-none focus:border-lead focus:bg-lead/10 transition" maxlength="1" inputmode="numeric">
        </div>
        
        <div class="flex gap-3">
            <button onclick="closePasswordModal()" class="flex-1 px-4 py-3 bg-white/5 border border-white/20 text-white font-bold rounded-lg hover:bg-white/10 transition">Cancelar</button>
            <button onclick="submitPassword()" class="flex-1 px-4 py-3 bg-lead text-white font-bold rounded-lg hover:bg-lead/80 transition shadow-lg shadow-lead/30">Entrar</button>
        </div>
    </div>
</div>

<script>
const REI_API_CHANNELS = 'https://reidosembeds.com/api/channels';

let allChannels = [];
let activeCategory = 'all';
let currentChannelId = null;

document.addEventListener('DOMContentLoaded', () => {
    loadChannels();
    setupPasswordInputs();
});

async function loadChannels() {
    try {
        const response = await fetch(REI_API_CHANNELS);
        const data = await response.json();
        
        if (data && data.success && Array.isArray(data.data)) {
            allChannels = data.data;
        } else if (Array.isArray(data)) {
            allChannels = data;
        }
        
        renderChannels(allChannels);
    } catch (error) {
        console.error('Erro ao carregar canais:', error);
        document.getElementById('categoriesContainer').innerHTML = '<p class="text-white/20 font-bold uppercase tracking-widest text-xs py-10">Erro ao carregar canais</p>';
    }
}

function buildCategoryNav(categories) {
    const nav = document.getElementById('categoryNav');
    let html = '<button class="cat-nav-btn active" onclick="filterByCategory(\'all\')" data-cat="all"><i class="fas fa-layer-group"></i> Todos</button>';
    
    categories.forEach(cat => {
        html += `<button class="cat-nav-btn" onclick="filterByCategory('${cat}')" data-cat-name="${cat}">${cat}</button>`;
    });
    
    nav.innerHTML = html;
}

function filterByCategory(catName) {
    activeCategory = catName;
    document.querySelectorAll('.cat-nav-btn').forEach(btn => btn.classList.remove('active'));
    
    if (catName === 'all') {
        document.querySelector('[data-cat="all"]').classList.add('active');
        document.querySelectorAll('.category-section').forEach(s => s.style.display = 'block');
    } else {
        const btn = Array.from(document.querySelectorAll('.cat-nav-btn')).find(b => b.textContent.trim() === catName);
        if (btn) btn.classList.add('active');
        
        document.querySelectorAll('.category-section').forEach(section => {
            section.style.display = section.dataset.category === catName ? 'block' : 'none';
        });
    }
}

function isAdultCategory(category) {
    const adultKeywords = ['adulto', 'xxx', 'hot', 'adult', 'porn', 'sex', '18+', 'premium adulto'];
    return adultKeywords.some(keyword => category.toLowerCase().includes(keyword));
}

function renderChannels(channels) {
    const container = document.getElementById('categoriesContainer');
    
    if (!channels || channels.length === 0) {
        container.innerHTML = '<p class="text-white/20 font-bold uppercase tracking-widest text-xs py-10">Nenhum canal disponível</p>';
        return;
    }
    
    // Agrupar canais por categoria
    const grouped = {};
    channels.forEach(channel => {
        const cat = channel.category || 'Sem Categoria';
        if (!grouped[cat]) grouped[cat] = [];
        grouped[cat].push(channel);
    });
    
    // Separar categorias adultas das normais
    const normalCategories = [];
    const adultCategories = [];
    Object.keys(grouped).forEach(cat => {
        if (isAdultCategory(cat)) {
            adultCategories.push(cat);
        } else {
            normalCategories.push(cat);
        }
    });
    
    // Ordenar ambas
    const sortedCategories = normalCategories.sort().concat(adultCategories.sort());
    
    // Construir navegação de categorias
    buildCategoryNav(sortedCategories);
    
    // Renderizar categorias
    let html = '';
    sortedCategories.forEach(category => {
        const isAdult = isAdultCategory(category);
        html += `
            <div class="category-section" data-category="${category}" data-adult="${isAdult}">
                <h2 class="category-title">${category}</h2>
                <div class="channels-grid" data-category-grid="${category}">
                    ${grouped[category].map(channel => renderChannelCard(channel, isAdult)).join('')}
                </div>
            </div>
        `;
    });
    
    container.innerHTML = html;
}

function renderChannelCard(channel, isAdult = false) {
    const img = channel.logo_url || channel.poster || channel.logo || '';
    const name = channel.name || channel.title || 'Canal';
    const bg = channel.preview_url ? `background-image: url('${channel.preview_url}');` : '';
    
    if (isAdult) {
        return `
            <div class="channel-card" data-channel-name="${name.toLowerCase()}" data-channel-id="${channel.id}" onclick="checkAdultPassword(event)" style="cursor: pointer;">
                <div class="channel-logo-wrapper" style="${bg}">
                    <img src="${img}" alt="${name}" onerror="this.src='https://placehold.co/150x150/111/FFF?text=${encodeURIComponent(name)}'">
                </div>
                <h3 class="channel-name">${name}</h3>
            </div>
        `;
    }
    
    return `
        <div class="channel-card" data-channel-name="${name.toLowerCase()}" onclick="window.location.href='tv?id=${channel.id}&type=channel'" style="cursor: pointer;">
            <div class="channel-logo-wrapper" style="${bg}">
                <img src="${img}" alt="${name}" onerror="this.src='https://placehold.co/150x150/111/FFF?text=${encodeURIComponent(name)}'">
            </div>
            <h3 class="channel-name">${name}</h3>
        </div>
    `;
}

function checkAdultPassword(event) {
    event.stopPropagation();
    currentChannelId = event.currentTarget.getAttribute('data-channel-id');
    openPasswordModal();
}

function openPasswordModal() {
    const modal = document.getElementById('passwordModal');
    modal.classList.remove('hidden');
    document.getElementById('passwordInput1').focus();
    
    document.getElementById('passwordInput1').value = '';
    document.getElementById('passwordInput2').value = '';
    document.getElementById('passwordInput3').value = '';
    document.getElementById('passwordInput4').value = '';
}

function closePasswordModal() {
    const modal = document.getElementById('passwordModal');
    modal.classList.add('hidden');
    currentChannelId = null;
}

function submitPassword() {
    const pass1 = document.getElementById('passwordInput1').value;
    const pass2 = document.getElementById('passwordInput2').value;
    const pass3 = document.getElementById('passwordInput3').value;
    const pass4 = document.getElementById('passwordInput4').value;
    const fullPassword = pass1 + pass2 + pass3 + pass4;
    
    if (fullPassword === '0000') {
        window.location.href = `tv?id=${currentChannelId}&type=channel`;
    } else {
        const inputs = [document.getElementById('passwordInput1'), document.getElementById('passwordInput2'), document.getElementById('passwordInput3'), document.getElementById('passwordInput4')];
        inputs.forEach(input => {
            input.style.borderColor = '#ff6b6b';
            input.style.backgroundColor = 'rgba(255, 107, 107, 0.1)';
        });
        
        setTimeout(() => {
            inputs.forEach(input => {
                input.style.borderColor = 'rgba(255, 255, 255, 0.2)';
                input.style.backgroundColor = 'rgba(255, 255, 255, 0.05)';
            });
        }, 500);
        
        document.getElementById('passwordInput1').value = '';
        document.getElementById('passwordInput2').value = '';
        document.getElementById('passwordInput3').value = '';
        document.getElementById('passwordInput4').value = '';
        document.getElementById('passwordInput1').focus();
    }
}

function setupPasswordInputs() {
    const inputs = ['passwordInput1', 'passwordInput2', 'passwordInput3', 'passwordInput4'];
    
    inputs.forEach((id, index) => {
        const input = document.getElementById(id);
        if (!input) return;
        
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                submitPassword();
                return;
            }
            
            if (e.key === 'Backspace') {
                if (input.value === '' && index > 0) {
                    document.getElementById(inputs[index - 1]).focus();
                }
            }
        });
        
        input.addEventListener('input', (e) => {
            if (e.target.value && index < inputs.length - 1) {
                document.getElementById(inputs[index + 1]).focus();
            }
        });
    });
    
    const modal = document.getElementById('passwordModal');
    if (modal) {
        modal.addEventListener('click', (e) => {
            if (e.target.id === 'passwordModal') {
                closePasswordModal();
            }
        });
    }
}

function filterChannels() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    const categories = document.querySelectorAll('.category-section');
    
    categories.forEach(cat => {
        const cards = cat.querySelectorAll('.channel-card');
        let visibleCount = 0;
        
        cards.forEach(card => {
            const name = card.dataset.channelName || '';
            const isVisible = name.includes(query);
            card.style.display = isVisible ? 'flex' : 'none';
            if (isVisible) visibleCount++;
        });
        
        cat.style.display = visibleCount > 0 ? 'block' : 'none';
    });
}
</script>
