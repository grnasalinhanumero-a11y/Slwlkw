*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Montserrat',sans-serif;
    -webkit-tap-highlight-color:transparent;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#050505;
    color:#fff;
    overflow-x:hidden;
}

header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    z-index:999;
    background:rgba(5,5,5,.75);
    backdrop-filter:blur(15px);
    border-bottom:1px solid rgba(255,255,255,.05);
}

.desktop-nav{
    display:flex;
    align-items:center;
    gap:6px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
    padding:6px;
    border-radius:999px;
    backdrop-filter:blur(10px);
}

.desktop-nav a{
    color:#fff;
    text-decoration:none;
    padding:10px 14px;
    border-radius:999px;
    font-size:.75rem;
    font-weight:700;
    transition:.25s;
}

.desktop-nav a:hover{
    background:rgba(255,255,255,.08);
}

.mobile-nav{
    position:fixed;
    left:50%;
    bottom:12px;
    transform:translateX(-50%);
    width:calc(100% - 20px);
    max-width:600px;
    height:64px;
    background:rgba(10,10,10,.92);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.1);
    border-radius:20px;
    display:none;
    align-items:center;
    justify-content:space-around;
    z-index:9999;
    box-shadow:0 10px 40px rgba(0,0,0,.6);
    padding: 0 10px;
    overflow-x:auto;
}

.mobile-nav::-webkit-scrollbar{
    display:none;
}

.mobile-nav-item{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:2px;
    color:rgba(255,255,255,.5);
    text-decoration:none;
    font-size:.6rem;
    font-weight:700;
    transition:.25s;
    flex:0 0 auto;
    height:100%;
    padding:0 8px;
    white-space:nowrap;
}

.mobile-nav-item i{
    font-size:1rem;
}

.mobile-nav-item.active,
.mobile-nav-item:hover{
    color:#348cfe;
}

.channels-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(160px, 1fr));
    gap:20px;
    padding:20px 0;
}

.channel-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    transition: 0.3s;
}

.channel-card:hover .channel-logo-wrapper {
    transform: scale(1.08);
    border-color: #348cfe;
}

.channel-logo-wrapper{
    width:100%;
    aspect-ratio:1/1;
    background:#fff;
    border-radius:25px;
    padding:18px;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 15px 35px rgba(0,0,0,.45);
    transition: 0.3s;
    border: 2px solid transparent;
    margin-bottom:12px;
}

.channel-logo-wrapper img{
    width:100%;
    height:100%;
    object-fit:contain;
}

.channel-name {
    text-align: center;
    font-size: 12px;
    font-weight: 900;
    text-transform: uppercase;
    tracking-tighter: true;
    truncate: true;
    width: 100%;
}

@media(max-width:768px){
    body{
        padding-bottom:85px;
    }
    .channels-grid{
        grid-template-columns:repeat(auto-fill, minmax(120px, 1fr));
        gap:12px;
    }
    .mobile-nav{
        display:flex;
    }
    header nav{
        display:none !important;
    }
}

            Canais Premium

<script>
const REI_API_CHANNELS = 'https://reidosembeds.com/api/channels';

document.addEventListener('DOMContentLoaded', () => {
    loadChannels();
});

async function loadChannels() {
    try {
        const response = await fetch(REI_API_CHANNELS);
        const data = await response.json();
        let channels = [];
        
        if (data && data.success && Array.isArray(data.data)) {
            channels = data.data;
        } else if (Array.isArray(data)) {
            channels = data;
        }
        
        renderChannels(channels);
    } catch (error) {
        console.error('Erro ao carregar canais:', error);
        document.getElementById('channelsGrid').innerHTML = '<p class="text-white/20 font-bold uppercase tracking-widest text-xs py-10">Erro ao carregar canais</p>';
    }
}

function renderChannels(channels) {
    const container = document.getElementById('channelsGrid');
    
    if (!channels || channels.length === 0) {
        container.innerHTML = '<p class="text-white/20 font-bold uppercase tracking-widest text-xs py-10">Nenhum canal disponível</p>';
        return;
    }
    
    container.innerHTML = channels.map(channel => {
        const img = channel.poster || channel.logo || '';
        const name = channel.title || channel.name || 'Canal';
        
        return `
            <div class="channel-card" onclick="window.location.href='tv?id=${channel.id}&type=channel'">
                <div class="channel-logo-wrapper">
                    <img src="${img}" alt="${name}" onerror="this.src='https://placehold.co/150x150/111/FFF?text=${encodeURIComponent(name)}'">
                </div>
                <h3 class="channel-name">${name}</h3>
            </div>
        `;
    }).join('');
}
</script>
