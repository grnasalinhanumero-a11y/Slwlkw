*{

}

html{

body{

}

header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    z-index:999;
    background:rgba(5,5,5,.75);
    backdrop-filter:blur(15px);
    border-bottom:1px solid rgba(255,255,255,.05);
}

.desktop-nav{
    display:flex;
    align-items:center;
    gap:6px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
    padding:6px;
    border-radius:999px;
    backdrop-filter:blur(10px);
}

.desktop-nav a{
    color:#fff;
    text-decoration:none;
    padding:10px 14px;
    border-radius:999px;
    font-size:.75rem;
    font-weight:700;
    transition:.25s;
}

.desktop-nav a:hover{
    background:rgba(255,255,255,.08);
}

.mobile-nav{
    position:fixed;
    left:50%;
    bottom:12px;
    transform:translateX(-50%);
    width:calc(100% - 20px);
    max-width:600px;
    height:64px;
    background:rgba(10,10,10,.92);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.1);
    border-radius:20px;
    display:none;
    align-items:center;
    justify-content:space-around;
    z-index:9999;
    box-shadow:0 10px 40px rgba(0,0,0,.6);
    padding: 0 10px;
    overflow-x:auto;
}

.mobile-nav::-webkit-scrollbar{
    display:none;
}

.mobile-nav-item{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:2px;
    color:rgba(255,255,255,.5);
    text-decoration:none;
    font-size:.6rem;
    font-weight:700;
    transition:.25s;
    flex:0 0 auto;
    height:100%;
    padding:0 8px;
    white-space:nowrap;
}

.mobile-nav-item i{
    font-size:1rem;
}

.mobile-nav-item.active,
.mobile-nav-item:hover{
    color:#348cfe;
}

.events-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
    gap:20px;
    padding:20px 0;
}

.event-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 20px;
    transition: 0.3s;
    cursor: pointer;
}
.event-card:hover {
    background: rgba(255,255,255,0.1);
    border-color: #348cfe;
    transform: translateY(-5px);
}
.event-badge {
    background: #ef4444;
    color: white;
    font-size: 10px;
    font-weight: 900;
    padding: 6px 10px;
    border-radius: 6px;
    text-transform: uppercase;
    animation: pulse 2s infinite;
    display:inline-block;
}
@keyframes pulse {
    0% { opacity: 1; }
    50% { opacity: 0.5; }
    100% { opacity: 1; }
}

@media(max-width:768px){
    body{
        padding-bottom:85px;

    .events-grid{
        grid-template-columns:1fr;
    }
    .mobile-nav{

    }
    header nav{
        display:none !important;

}

<script>
const REI_API_EVENTS = 'https://reidosembeds.com/api/eventos';

document.addEventListener('DOMContentLoaded', () => {
    loadAllEvents();
});

async function loadAllEvents() {
    try {
        const response = await fetch(REI_API_EVENTS);
        const data = await response.json();
        let events = [];
        
        if (data && data.success && Array.isArray(data.data)) {
            events = data.data;
        } else if (Array.isArray(data)) {
            events = data;
        }
        
        // Ordenar por status (ao vivo primeiro) e depois por horário
        events.sort((a, b) => {
            if (a.status === 'live' && b.status !== 'live') return -1;
            if (a.status !== 'live' && b.status === 'live') return 1;
            return (a.start_time || '').localeCompare(b.start_time || '');
        });
        
        renderEvents(events);
    } catch (error) {
        console.error('Erro ao carregar eventos:', error);
        document.getElementById('eventsGrid').innerHTML = '<p class="text-white/20 font-bold uppercase tracking-widest text-xs py-10">Erro ao carregar eventos</p>';
    }
}

function renderEvents(events) {
    const container = document.getElementById('eventsGrid');
    
    if (!events || events.length === 0) {
        container.innerHTML = '<p class="text-white/20 font-bold uppercase tracking-widest text-xs py-10">Nenhum evento disponível</p>';
        return;
    }
    
    container.innerHTML = events.map(event => {
        const time = event.start_time ? event.start_time.split(' ')[1].substring(0, 5) : '--:--';
        const date = event.start_time ? event.start_time.split(' ')[0] : '';
        
        return `
            <div class="event-card" onclick="window.location.href='tv?id=${event.id}&type=event'">
                <div class="flex justify-between items-start mb-6">
                    <span class="event-badge">${event.status === 'live' ? 'Ao Vivo' : time}</span>
                    <span class="text-[10px] font-black text-white/30 uppercase italic">${event.category || 'Esporte'}</span>
                </div>
                
                <div class="flex items-center justify-around gap-4 mb-6">
                    <div class="text-center">
                        <img src="${event.time1 || ''}" class="w-16 h-16 object-contain mx-auto mb-2" onerror="this.src='https://placehold.co/100x100/111/FFF?text=T1'" alt="Time 1">
                        <p class="text-[9px] font-bold text-white/60 uppercase">${event.team1 || 'Time 1'}</p>
                    </div>
                    <div class="text-xs font-black text-white/10 italic">VS</div>
                    <div class="text-center">
                        <img src="${event.time2 || ''}" class="w-16 h-16 object-contain mx-auto mb-2" onerror="this.src='https://placehold.co/100x100/111/FFF?text=T2'" alt="Time 2">
                        <p class="text-[9px] font-bold text-white/60 uppercase">${event.team2 || 'Time 2'}</p>
                    </div>
                </div>
                
                <h3 class="text-sm font-black text-center truncate uppercase tracking-tight mb-3">${event.title || 'Evento'}</h3>
                
                <div class="flex flex-col items-center gap-2 border-t border-white/10 pt-3">
                    <p class="text-[10px] text-center text-lead font-black uppercase italic">${event.competition || 'Competição'}</p>
                    <p class="text-[9px] text-white/40 font-bold uppercase">${event.channel_name || ''}</p>
                    <p class="text-[8px] text-white/30 font-bold">${date}</p>
                </div>
            </div>
        `;
    }).join('');
}
</script>
